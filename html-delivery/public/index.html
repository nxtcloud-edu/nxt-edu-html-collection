<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/assets/theme.js"></script>
<link rel="icon" href="/assets/nxtcloud-logo.png?v=2">
<title>AI 콘텐츠 갤러리</title>
<style>
:root{color-scheme:dark;--bg:#090a12;--panel:#141629;--line:#30344f;--text:#f4f6ff;--muted:#9ca3bd;--cyan:#00d2ff;--pink:#e94560}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -20%,#242a55 0,var(--bg) 48%);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}a{color:inherit}nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:20px;padding:16px max(5vw,20px);border-bottom:1px solid #ffffff1a;background:#090a12e0;backdrop-filter:blur(14px)}.brand{font-weight:800;text-decoration:none}.brand-mark,.card-label{color:var(--cyan)}.upload-link{padding:11px 16px;background:var(--pink);font-weight:700;text-decoration:none;box-shadow:4px 4px 0 #741f37}main{width:min(1120px,90vw);margin:auto;padding:72px 0 88px}.hero{max-width:800px;padding:24px 0 48px}.eyebrow{color:var(--cyan);font-size:13px;font-weight:700;letter-spacing:.12em}h1{margin:14px 0 0;font-size:clamp(38px,7vw,72px);line-height:1.05;letter-spacing:-.07em}.hero>p:last-child{color:var(--muted);font-size:clamp(16px,2vw,19px);line-height:1.8}.section{margin-top:42px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:20px}h2{margin:0;font-size:clamp(24px,4vw,34px)}.count{color:var(--muted);font-size:13px}#filters,.cohort-grid{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 18px}.filter{flex:none;padding:9px 13px;border:1px solid var(--line);background:#10121f;color:var(--muted);font:inherit;cursor:pointer}.filter:hover,.filter[aria-pressed=true]{border-color:var(--cyan);color:var(--text);background:#122535}.cohort-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.cohort-card{padding:22px;border:1px solid var(--line);background:#111426;text-decoration:none}.cohort-card:hover{border-color:var(--cyan)}.cohort-card strong{display:block;margin-bottom:10px;font-size:17px;overflow-wrap:anywhere}.cohort-card span{color:var(--muted)}#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}.game-card{position:relative;min-height:190px;display:flex;flex-direction:column;justify-content:space-between;padding:22px;border:1px solid var(--line);background:linear-gradient(145deg,#1d213df0,#0f111ff5);text-decoration:none;transition:.15s}.game-card:after{content:'↗';position:absolute;right:18px;bottom:14px;color:var(--cyan);font-size:21px}.game-card:hover{border-color:var(--cyan);transform:translateY(-3px)}.card-label{font-size:12px;letter-spacing:.08em}.game-card h3{margin:16px 0 8px;font-size:24px;overflow-wrap:anywhere}.meta{margin:0;color:var(--muted);overflow-wrap:anywhere}.category{display:inline-block;margin-top:10px;padding:4px 7px;border:1px solid #454b6c;color:#cbd1ec;font-size:11px}time{color:#737b98;font-size:12px}.state{grid-column:1/-1;padding:48px 24px;border:1px dashed var(--line);color:var(--muted);text-align:center;line-height:1.7}.error{border-color:var(--pink);color:#ff9aae}@media(max-width:560px){nav{padding:13px 16px}.brand-label{display:none}main{width:92vw;padding-top:42px}}
</style>
<link rel="stylesheet" href="/assets/theme.css">
</head>
<body><span class="grid-twinkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
<nav class="site-nav"><a class="site-brand" href="/"><img class="brand-logo" src="/assets/nxtcloud-logo.png?v=2" alt="NXT Cloud"><span class="site-brand-label">AI CONTENT GALLERY</span></a><div class="site-tools"><button class="theme-toggle" type="button" data-theme-toggle>🌙 다크</button><a class="upload-link" href="upload.html">내 콘텐츠 업로드</a></div></nav>
<main>
<section class="hero"><p class="eyebrow">BUILT WITH AI · SHARED WITH EVERYONE</p><h1>AI와 함께 만든<br>우리들의 콘텐츠</h1><p>AI 리터러시 수업에서 수강생들이 자기 AI 에이전트와 협업해 만든 웹페이지와 미니게임입니다. 카드를 누르면 새 탭에서 바로 볼 수 있어요.</p></section>
<section class="section" aria-labelledby="cohort-title"><div class="section-head"><h2 id="cohort-title">수업별 모아보기</h2></div><div id="cohorts" class="cohort-grid"><div class="state">수업 목록을 불러오는 중...</div></div></section>
<section class="section" aria-labelledby="gallery-title"><div class="section-head"><h2 id="gallery-title">콘텐츠 둘러보기</h2><span id="gameCount" class="count" aria-live="polite"></span></div><div id="sorts" aria-label="콘텐츠 정렬"><button class="filter" type="button" data-sort="latest" aria-pressed="true">최신순</button><button class="filter" type="button" data-sort="likes" aria-pressed="false">추천순</button></div><div id="filters" aria-label="콘텐츠 분류 필터"></div><div id="gallery" aria-live="polite"><div class="state">콘텐츠를 불러오는 중...</div></div></section>
</main>
<script>
const gallery=document.getElementById('gallery'),filters=document.getElementById('filters'),sorts=document.getElementById('sorts'),gameCount=document.getElementById('gameCount'),cohortGrid=document.getElementById('cohorts');let activeCategory='전체',activeSort='latest';
function formatDate(value){const date=new Date(value);return Number.isNaN(date.getTime())?'업로드 시각 알 수 없음':new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(date)}
function renderGames(games){gallery.replaceChildren();gameCount.textContent=`${games.length}개의 콘텐츠`;if(!games.length){const empty=document.createElement('div');empty.className='state';empty.textContent='아직 등록된 콘텐츠가 없어요.';gallery.append(empty);return}games.forEach(game=>{const card=document.createElement('a');card.className='game-card';card.href=`view.html?id=${game.contentId}`;const top=document.createElement('div'),label=document.createElement('span'),title=document.createElement('h3'),meta=document.createElement('p'),cardMeta=document.createElement('div'),category=document.createElement('span'),likes=document.createElement('span'),time=document.createElement('time');label.className='card-label';label.textContent=`OPEN CONTENT · v${game.latestVersion}`;title.textContent=game.title||game.name;meta.className='meta';meta.textContent=`${game.name} · ${game.affiliation}`;cardMeta.className='card-meta';category.className='category';category.textContent=game.category;likes.className='card-likes';likes.textContent=`♥ ${game.likes}`;cardMeta.append(category,likes);time.dateTime=game.updatedAt;time.textContent=formatDate(game.updatedAt);top.append(label,title,meta,cardMeta);card.append(top,time);gallery.append(card)})}
async function loadGames(){const params=new URLSearchParams({sort:activeSort});if(activeCategory!=='전체')params.set('category',activeCategory);const response=await fetch(`/api/games?${params}`);if(!response.ok)throw new Error();renderGames((await response.json()).games)}
function renderFilters(categories){filters.replaceChildren();['전체',...categories.slice().reverse()].forEach(value=>{const button=document.createElement('button');button.className='filter';button.type='button';button.textContent=value;button.setAttribute('aria-pressed',String(value===activeCategory));button.addEventListener('click',async()=>{activeCategory=value;filters.querySelectorAll('button').forEach(item=>item.setAttribute('aria-pressed',String(item===button)));try{await loadGames()}catch{renderError()}});filters.append(button)})}
function renderCohorts(cohorts,games){cohortGrid.replaceChildren();cohorts.forEach(cohort=>{const card=document.createElement('a');card.className='cohort-card';card.href=`cohort.html?c=${encodeURIComponent(cohort.name)}`;const title=document.createElement('strong'),count=document.createElement('span');title.textContent=cohort.name;count.textContent=`${games.filter(game=>game.affiliation===cohort.name).length}개의 콘텐츠`;card.append(title,count);cohortGrid.append(card)})}
function renderError(){gallery.replaceChildren();const error=document.createElement('div');error.className='state error';error.textContent='콘텐츠를 불러오지 못했어요. 잠시 후 새로고침해 주세요.';gallery.append(error);gameCount.textContent=''}
sorts.addEventListener('click',async event=>{const button=event.target.closest('[data-sort]');if(!button)return;activeSort=button.dataset.sort;sorts.querySelectorAll('button').forEach(item=>item.setAttribute('aria-pressed',String(item===button)));try{await loadGames()}catch{renderError()}});
async function init(){try{const responses=await Promise.all([fetch('/api/cohorts'),fetch('/api/categories'),fetch('/api/games')]);if(responses.some(response=>!response.ok))throw new Error();const [cohortData,categoryData,gameData]=await Promise.all(responses.map(response=>response.json()));renderFilters(categoryData.categories);renderCohorts(cohortData.cohorts,gameData.games);renderGames(gameData.games)}catch{cohortGrid.replaceChildren();renderError()}}
init();
</script>
</body></html>
