<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<script src="/assets/theme.js"></script>
<link rel="icon" href="/assets/nxtcloud-logo.png?v=2">
<link rel="stylesheet" href="/assets/theme.css">
<title>관리자 페이지 · AI 콘텐츠 갤러리</title>
<style>
main{width:min(1180px,94vw);margin:auto;padding:calc(var(--sp-8) + var(--sp-8)) 0 calc(var(--sp-8) + var(--sp-8))}.admin-hero{max-width:760px;margin-bottom:var(--sp-8)}.admin-hero h1{margin:var(--sp-3) 0 var(--sp-3);font-size:clamp(34px,6vw,56px);line-height:1.15;letter-spacing:-.06em}.admin-copy{color:var(--muted);line-height:1.7;word-break:keep-all}.admin-grid{display:grid;grid-template-columns:280px minmax(0,1fr);gap:var(--sp-6);align-items:start}.admin-panel{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:var(--sp-6);box-shadow:0 1px 3px rgba(28,31,46,.08),0 4px 14px rgba(28,31,46,.06)}.admin-panel h2{margin:0 0 var(--sp-4);font-size:24px;letter-spacing:-.02em}.field{display:grid;gap:var(--sp-2);margin-bottom:var(--sp-4)}.field label,.admin-label{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:13px;color:var(--muted)}.field input,.field select{width:100%;max-width:100%;min-height:44px;padding:var(--sp-3);border:1px solid var(--line);border-radius:10px;background:var(--input);color:var(--text);font:inherit}.button-row,.toolbar,.row-actions{display:flex;align-items:center;flex-wrap:wrap;gap:var(--sp-2)}.row-actions{flex-wrap:nowrap}.actions-cell{white-space:nowrap;min-width:210px}button.admin-button{min-height:40px;white-space:nowrap;padding:var(--sp-2) var(--sp-4);border:1px solid var(--line);border-radius:10px;background:var(--panel-soft);color:var(--text);font:inherit;font-weight:700;cursor:pointer}button.admin-button.primary{border-color:#0f172a;background:#0f172a;color:#fff}button.admin-button.danger{border-color:var(--danger);color:var(--danger)}button.admin-button:hover{border-color:var(--cyan)}button.admin-button:disabled{opacity:.5;cursor:not-allowed}.status-line{min-height:24px;margin:0 0 var(--sp-4);color:var(--muted);line-height:1.5;word-break:keep-all}.status-line.error{color:var(--danger)}.status-line.success{color:var(--cyan)}.toolbar{justify-content:space-between;margin-bottom:var(--sp-4)}.filters{display:flex;align-items:end;flex-wrap:wrap;gap:var(--sp-3)}.filters .field{min-width:220px;margin-bottom:0}.table-wrap{overflow-x:visible;border:1px solid var(--line);border-radius:16px;background:var(--panel)}table{width:100%;border-collapse:collapse}th,td{padding:var(--sp-3);border-bottom:1px solid var(--line);vertical-align:top;text-align:left}th{white-space:nowrap}td{word-break:keep-all}th{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;color:var(--muted);letter-spacing:.06em;background:var(--panel-soft)}td{line-height:1.5}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;color:var(--muted)}.title-cell strong{display:block;margin-bottom:var(--sp-1);word-break:keep-all}.edit-form,.feedback-panel{display:grid;gap:var(--sp-3);padding:var(--sp-4);border-top:1px solid var(--line);background:var(--panel-soft)}.edit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--sp-3)}.edit-form .admin-button.primary{justify-self:end;width:auto}.feedback-item{display:flex;justify-content:space-between;gap:var(--sp-4);padding:var(--sp-3);border:1px solid var(--line);border-radius:10px;background:var(--panel)}.feedback-message{margin:var(--sp-1) 0 0;word-break:keep-all}.hidden{display:none!important}@media(max-width:840px){.admin-grid{grid-template-columns:1fr}.edit-grid{grid-template-columns:1fr}main{width:min(94vw,1180px)}}
</style>
</head>
<body><span class="grid-twinkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
<nav class="site-nav"><a class="site-brand" href="/"><img class="brand-logo" src="/assets/nxtcloud-logo.png?v=2" alt="NXT Cloud"><span class="site-brand-label">AI CONTENT ADMIN</span></a><div class="site-tools"><button class="theme-toggle" type="button" data-theme-toggle>🌙 다크</button><button id="logoutButton" class="admin-button" type="button" hidden>로그아웃</button></div></nav>
<main>
<section class="admin-hero"><p class="eyebrow">ADMIN ONLY · NOINDEX</p><h1>콘텐츠 관리</h1><p class="admin-copy">수강생 콘텐츠의 표시 정보, 소유 비밀번호, 피드백, 삭제 작업을 관리합니다. 변경 전 대상 콘텐츠를 다시 확인하세요.</p></section>
<p id="statusLine" class="status-line" aria-live="polite"></p>
<section id="loginPanel" class="admin-panel"><h2>관리자 로그인</h2><form id="loginForm"><div class="field"><label for="adminId">아이디</label><input id="adminId" name="id" autocomplete="username" required></div><div class="field"><label for="adminPassword">비밀번호</label><input id="adminPassword" name="password" type="password" autocomplete="current-password" required></div><div class="button-row"><button class="admin-button primary" type="submit">로그인</button></div></form></section>
<section id="adminPanel" class="admin-grid hidden" aria-label="콘텐츠 관리 화면">
<aside class="admin-panel"><h2>필터</h2><div class="filters"><div class="field"><label for="cohortFilter">코호트</label><select id="cohortFilter"></select></div><div class="field"><label for="searchInput">검색</label><input id="searchInput" type="search" placeholder="제목 또는 이름"></div></div><p id="contentCount" class="status-line"></p></aside>
<section class="admin-panel"><div class="toolbar"><h2>콘텐츠 목록</h2><button id="refreshButton" class="admin-button" type="button">새로고침</button></div><div class="table-wrap"><table><thead><tr><th>제목</th><th>이름</th><th>코호트</th><th>분류</th><th>버전</th><th>추천</th><th>업데이트</th><th>동작</th></tr></thead><tbody id="contentRows"></tbody></table></div></section>
</section>
</main>
<script>
const statusLine=document.getElementById('statusLine');
const loginPanel=document.getElementById('loginPanel');
const adminPanel=document.getElementById('adminPanel');
const loginForm=document.getElementById('loginForm');
const logoutButton=document.getElementById('logoutButton');
const cohortFilter=document.getElementById('cohortFilter');
const searchInput=document.getElementById('searchInput');
const refreshButton=document.getElementById('refreshButton');
const contentRows=document.getElementById('contentRows');
const contentCount=document.getElementById('contentCount');
let games=[];
let cohorts=[];
let categories=[];
function setStatus(message,type){statusLine.textContent=message||'';statusLine.className=`status-line ${type||''}`.trim()}
function formatDate(value){const date=new Date(value);return Number.isNaN(date.getTime())?'시각 알 수 없음':new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(date)}
function showLoggedIn(){loginPanel.classList.add('hidden');adminPanel.classList.remove('hidden');logoutButton.hidden=false}
function showLoggedOut(message){adminPanel.classList.add('hidden');loginPanel.classList.remove('hidden');logoutButton.hidden=true;if(message)setStatus(message,'error')}
async function api(path,options={}){const response=await fetch(path,{headers:{'content-type':'application/json',...(options.headers||{})},...options});let body=null;try{body=await response.json()}catch{}if(!response.ok){const error=new Error(body?.error||'요청을 처리하지 못했어요.');error.status=response.status;throw error}return body}
function option(value,label){const item=document.createElement('option');item.value=value;item.textContent=label;return item}
function fillFilters(){cohortFilter.replaceChildren(option('전체','전체 코호트'));cohorts.forEach(cohort=>cohortFilter.append(option(cohort.name,cohort.name)))}
function filteredGames(){const selected=cohortFilter.value;const query=searchInput.value.trim().toLowerCase();return games.filter(game=>(selected==='전체'||game.affiliation===selected)&&(!query||String(game.title||'').toLowerCase().includes(query)||String(game.name||'').toLowerCase().includes(query)))}
function cell(text,className){const td=document.createElement('td');if(className)td.className=className;td.textContent=text;return td}
function button(label,className,type='button'){const item=document.createElement('button');item.type=type;item.className=`admin-button ${className||''}`.trim();item.textContent=label;return item}
function field(labelText,input){const wrap=document.createElement('div');wrap.className='field';const label=document.createElement('label');label.textContent=labelText;wrap.append(label,input);return wrap}
function input(value){const item=document.createElement('input');item.value=value||'';return item}
function select(values,current){const item=document.createElement('select');values.forEach(value=>item.append(option(value,value)));item.value=current;return item}
function contentTitle(game){return game.title||game.name}
function renderRows(){const visible=filteredGames();contentRows.replaceChildren();contentCount.textContent=`${visible.length}개의 콘텐츠`;if(!visible.length){const tr=document.createElement('tr');const td=cell('조건에 맞는 콘텐츠가 없어요.');td.colSpan=8;tr.append(td);contentRows.append(tr);return}visible.forEach(game=>{const tr=document.createElement('tr');const titleTd=document.createElement('td');titleTd.className='title-cell';const strong=document.createElement('strong');strong.textContent=contentTitle(game);const id=document.createElement('span');id.className='mono';id.textContent=game.contentId;titleTd.append(strong,id);tr.append(titleTd,cell(game.name),cell(game.affiliation),cell(game.category),cell(`v${game.latestVersion}`,'mono'),cell(`♥ ${game.likes||0}`,'mono'),cell(formatDate(game.updatedAt),'mono'));
const actions=document.createElement('td');actions.className='actions-cell';const rowActions=document.createElement('div');rowActions.className='row-actions';const editButton=button('수정');const resetButton=button('비번 재설정');const feedbackButton=button('피드백');const deleteButton=button('삭제','danger');rowActions.append(editButton,resetButton,feedbackButton,deleteButton);actions.append(rowActions);tr.append(actions);contentRows.append(tr);
editButton.addEventListener('click',()=>toggleEditRow(game,tr));resetButton.addEventListener('click',()=>resetPassword(game));feedbackButton.addEventListener('click',()=>toggleFeedbackRow(game,tr));deleteButton.addEventListener('click',()=>deleteContent(game));})}
function toggleEditRow(game,anchor){const next=anchor.nextElementSibling;if(next?.dataset.panel===`edit-${game.contentId}`){next.remove();return}const row=document.createElement('tr');row.dataset.panel=`edit-${game.contentId}`;const td=document.createElement('td');td.colSpan=8;const form=document.createElement('form');form.className='edit-form';const grid=document.createElement('div');grid.className='edit-grid';const titleInput=input(game.title);const nameInput=input(game.name);const cohortSelect=select(cohorts.map(cohort=>cohort.name),game.affiliation);const categorySelect=select(categories,game.category);grid.append(field('제목',titleInput),field('이름/팀',nameInput),field('코호트',cohortSelect),field('분류',categorySelect));const save=button('수정 저장','primary','submit');form.append(grid,save);form.addEventListener('submit',async event=>{event.preventDefault();try{await api(`/api/admin/content/${game.contentId}`,{method:'PATCH',body:JSON.stringify({title:titleInput.value,name:nameInput.value,affiliation:cohortSelect.value,category:categorySelect.value})});setStatus('콘텐츠 정보를 수정했어요.','success');await loadData()}catch(error){setStatus(error.message,'error')}});td.append(form);row.append(td);anchor.after(row)}
async function resetPassword(game){const next=window.prompt(`${contentTitle(game)} 새 비밀번호를 입력하세요.`);if(next===null)return;if(next.length<4||next.length>30){setStatus('비밀번호는 4~30자로 입력하세요.','error');return}try{await api('/api/admin/reset-password',{method:'POST',body:JSON.stringify({contentId:game.contentId,newPassword:next})});setStatus('비밀번호를 재설정했어요.','success')}catch(error){setStatus(error.message,'error')}}
async function deleteContent(game){if(!window.confirm(`${contentTitle(game)} 콘텐츠를 삭제할까요? 이 작업은 되돌릴 수 없어요.`))return;try{await api(`/api/admin/content/${game.contentId}`,{method:'DELETE'});setStatus('콘텐츠를 삭제했어요.','success');await loadData()}catch(error){setStatus(error.message,'error')}}
function feedbackRowId(game){return `feedback-${game.contentId}`}
async function toggleFeedbackRow(game,anchor){const next=anchor.nextElementSibling;if(next?.dataset.panel===feedbackRowId(game)){next.remove();return}const row=document.createElement('tr');row.dataset.panel=feedbackRowId(game);const td=document.createElement('td');td.colSpan=8;const panel=document.createElement('div');panel.className='feedback-panel';const heading=document.createElement('span');heading.className='admin-label';heading.textContent='피드백을 불러오는 중...';panel.append(heading);td.append(panel);row.append(td);anchor.after(row);try{const data=await api(`/api/feedback?id=${game.contentId}`,{headers:{}});panel.replaceChildren();const label=document.createElement('span');label.className='admin-label';label.textContent=`피드백 ${data.feedback.length}개`;panel.append(label);if(!data.feedback.length){const empty=document.createElement('p');empty.className='status-line';empty.textContent='아직 피드백이 없어요.';panel.append(empty);return}data.feedback.forEach(item=>{const wrap=document.createElement('div');wrap.className='feedback-item';const body=document.createElement('div');const meta=document.createElement('span');meta.className='mono';meta.textContent=`${item.nickname} · ${formatDate(item.createdAt)}`;const message=document.createElement('p');message.className='feedback-message';message.textContent=item.message;body.append(meta,message);const remove=button('삭제','danger');remove.addEventListener('click',async()=>{try{await api('/api/admin/feedback',{method:'DELETE',body:JSON.stringify({contentId:game.contentId,createdAt:item.createdAt})});setStatus('피드백을 삭제했어요.','success');row.remove()}catch(error){setStatus(error.message,'error')}});wrap.append(body,remove);panel.append(wrap)})}catch(error){panel.replaceChildren();const message=document.createElement('p');message.className='status-line error';message.textContent=error.message;panel.append(message)}}
async function loadData(){const [cohortData,categoryData,gameData]=await Promise.all([api('/api/cohorts'),api('/api/categories'),api('/api/games')]);cohorts=cohortData.cohorts;categories=categoryData.categories;games=gameData.games;fillFilters();renderRows()}
loginForm.addEventListener('submit',async event=>{event.preventDefault();setStatus('로그인 중...');try{await api('/api/admin/login',{method:'POST',body:JSON.stringify({id:loginForm.id.value,password:loginForm.password.value})});loginForm.reset();showLoggedIn();setStatus('관리자로 로그인했어요.','success');await loadData()}catch(error){showLoggedOut(error.message)}});
logoutButton.addEventListener('click',async()=>{try{await api('/api/admin/logout',{method:'POST'});}catch{}showLoggedOut('로그아웃했어요.')});
refreshButton.addEventListener('click',async()=>{try{await loadData();setStatus('목록을 새로고침했어요.','success')}catch(error){setStatus(error.message,'error')}});
cohortFilter.addEventListener('change',renderRows);searchInput.addEventListener('input',renderRows);
async function init(){try{await api('/api/admin/session',{headers:{}});showLoggedIn();await loadData();setStatus('관리 세션이 유지 중입니다.','success')}catch(error){showLoggedOut(error.status===503?error.message:'관리자 로그인이 필요합니다.')}}
init();
</script>
</body></html>
