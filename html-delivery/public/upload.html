<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/assets/theme.js"></script>
<link rel="icon" href="/assets/nxtcloud-logo.png">
<title>내 게임 업로드 · AI 게임 갤러리</title>
<style>
  :root { color-scheme: dark; --bg: #090a12; --panel: #171a2f; --line: #3a3e5b; --text: #f4f6ff; --muted: #9ca3bd; --cyan: #00d2ff; --pink: #e94560; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 50% 0, #22284d 0, var(--bg) 55%); color: var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  main { width: min(92vw, 560px); margin: 0 auto; padding: 38px 0 72px; }
  .back { display: inline-block; margin-bottom: 28px; color: var(--muted); text-decoration: none; }
  .back:hover { color: var(--cyan); }
  .panel { padding: clamp(24px, 6vw, 42px); border: 1px solid var(--line); background: rgba(23,26,47,.96); box-shadow: 10px 10px 0 rgba(0,0,0,.28); }
  .eyebrow { margin: 0 0 10px; color: var(--cyan); font-size: 12px; letter-spacing: .12em; }
  h1 { margin: 0; font-size: clamp(30px, 7vw, 44px); letter-spacing: -.06em; }
  .intro { margin: 16px 0 28px; color: var(--muted); line-height: 1.7; }
  label { display: block; margin: 19px 0 7px; font-weight: 700; }
  select, input { width: 100%; min-height: 46px; padding: 11px 12px; border: 1px solid #555b78; border-radius: 0; background: #0e101d; color: var(--text); font: inherit; }
  select:focus, input:focus { outline: 2px solid var(--cyan); outline-offset: 2px; }
  input[type="file"] { padding: 9px; }
  button { min-height: 46px; margin-top: 24px; padding: 12px 20px; border: 0; background: var(--pink); color: #fff; cursor: pointer; font: inherit; font-weight: 800; }
  button:hover { background: #ff5b75; }
  button:disabled { cursor: wait; opacity: .55; }
  #result { margin-top: 24px; padding: 16px; border: 1px solid var(--cyan); line-height: 1.65; overflow-wrap: anywhere; }
  #result a { color: var(--cyan); }
  #result button { display: block; margin-top: 12px; background: #27304d; }
  [hidden] { display: none; }
  .error { border-color: var(--pink) !important; color: #ff9aae; }
  .hint { margin: 8px 0 0; color: #747c99; font-size: 12px; }
</style>
<link rel="stylesheet" href="/assets/theme.css">
</head>
<body>
<nav class="site-nav"><a class="site-brand" href="/"><img class="brand-logo" src="/assets/nxtcloud-logo.png" alt="NXT Cloud"><span class="site-brand-label">AI CONTENT GALLERY</span></a><div class="site-tools"><a class="back" href="/">← 갤러리</a><button class="theme-toggle" type="button" data-theme-toggle>🌙 다크</button></div></nav>
<main>
  <section class="panel" aria-labelledby="upload-title">
    <p class="eyebrow">PUBLISH YOUR GAME</p>
    <h1 id="upload-title">내 게임 업로드</h1>
    <p class="intro">수업과 이름을 확인하고, AI와 함께 만든 HTML 게임을 세상에 공개해 보세요.</p>
    <form id="uploadForm">
      <label for="affiliation">소속(수업)</label>
      <select id="affiliation" name="affiliation" required disabled>
        <option value="">수업 목록을 불러오는 중...</option>
      </select>
      <label for="category">분류</label>
      <select id="category" name="category" required disabled>
        <option value="">분류 목록을 불러오는 중...</option>
      </select>
      <label for="name">이름</label>
      <input id="name" name="name" maxlength="40" autocomplete="name" required>
      <label for="password">소유 비밀번호</label>
      <input id="password" name="password" type="password" minlength="4" maxlength="30" autocomplete="new-password" required>
      <p class="hint">같은 수업·이름·분류로 다시 올리면 이 비밀번호를 확인하고 새 버전으로 업데이트됩니다.</p>
      <label for="file">HTML 파일</label>
      <input id="file" name="file" type="file" accept=".html,text/html" required>
      <p class="hint">HTML 파일 1개 · 최대 1MB</p>
      <button id="submitButton" type="submit" disabled>업로드하고 URL 받기</button>
    </form>
    <div id="result" hidden aria-live="polite"></div>
  </section>
</main>
<script>
const form = document.getElementById('uploadForm');
const affiliation = document.getElementById('affiliation');
const category = document.getElementById('category');
const submitButton = document.getElementById('submitButton');
const result = document.getElementById('result');

async function loadOptions() {
  try {
    const responses = await Promise.all([fetch('/api/cohorts'), fetch('/api/categories')]);
    if (responses.some((response) => !response.ok)) throw new Error('선택 목록 요청 실패');
    const [cohortData, categoryData] = await Promise.all(responses.map((response) => response.json()));
    affiliation.replaceChildren(new Option('소속(수업)을 선택하세요', ''));
    cohortData.cohorts.forEach((cohort) => affiliation.add(new Option(cohort, cohort)));
    category.replaceChildren(new Option('분류를 선택하세요', ''));
    categoryData.categories.forEach((value) => category.add(new Option(value, value)));
    affiliation.disabled = false;
    category.disabled = false;
    submitButton.disabled = false;
  } catch {
    affiliation.options[0].textContent = '선택 목록을 불러오지 못했습니다';
    category.options[0].textContent = '선택 목록을 불러오지 못했습니다';
    result.hidden = false;
    result.className = 'error';
    result.textContent = '페이지를 새로고침해 다시 시도해 주세요.';
  }
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  result.hidden = false;
  result.className = '';
  result.textContent = '업로드 중...';
  submitButton.disabled = true;
  try {
    const response = await fetch('/api/upload', { method: 'POST', body: new FormData(form) });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || '업로드에 실패했습니다.');
    result.replaceChildren('배포 완료: ');
    const link = document.createElement('a');
    link.href = data.url;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = data.url;
    const copyButton = document.createElement('button');
    copyButton.type = 'button';
    copyButton.textContent = 'URL 복사';
    copyButton.addEventListener('click', async () => {
      await navigator.clipboard.writeText(data.url);
      copyButton.textContent = '복사 완료!';
    });
    result.append(link, copyButton);
  } catch (error) {
    result.className = 'error';
    result.textContent = error.message;
  } finally {
    submitButton.disabled = false;
  }
});

loadOptions();
</script>
</body>
</html>
