<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="/assets/theme.js"></script><link rel="icon" href="/assets/nxtcloud-logo.png"><title>콘텐츠 보기 · AI 콘텐츠 갤러리</title>
<style>:root{color-scheme:dark;--bg:#090a12;--panel:#15182b;--line:#343954;--text:#f4f6ff;--muted:#9ca3bd;--cyan:#00d2ff;--pink:#e94560}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}main{width:min(1180px,94vw);margin:auto;padding:28px 0 80px}.topbar{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}.topbar a{color:var(--muted);text-decoration:none}.topbar a:hover{color:var(--cyan)}header{padding:32px 0 24px}h1{margin:0 0 14px;font-size:clamp(30px,6vw,54px);letter-spacing:-.06em;overflow-wrap:anywhere}.meta{display:flex;gap:8px 18px;flex-wrap:wrap;color:var(--muted);font-size:13px}.viewer{border:1px solid var(--line);background:#000;box-shadow:0 18px 60px #0008}iframe{display:block;width:100%;height:min(72vh,760px);min-height:420px;border:0;background:#fff}.feedback{display:grid;grid-template-columns:minmax(260px,.8fr) minmax(300px,1.2fr);gap:22px;margin-top:28px}.panel{padding:24px;border:1px solid var(--line);background:var(--panel)}h2{margin:0 0 20px}.panel label{display:block;margin:14px 0 7px;font-weight:700}.panel input,.panel textarea{width:100%;padding:11px 12px;border:1px solid #555b78;background:#0d0f1b;color:var(--text);font:inherit}.panel textarea{min-height:130px;resize:vertical}.panel button{margin-top:14px;padding:12px 18px;border:0;background:var(--pink);color:#fff;font:inherit;font-weight:800;cursor:pointer}.panel button:disabled{opacity:.55}.status{min-height:20px;margin:12px 0 0;color:var(--muted)}#feedbackList{display:grid;gap:12px}.feedback-item{padding:15px;border:1px solid var(--line);background:#101222}.feedback-head{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px}.feedback-item p{margin:11px 0 0;white-space:pre-wrap;overflow-wrap:anywhere}.empty{color:var(--muted)}@media(max-width:760px){.feedback{grid-template-columns:1fr}iframe{min-height:58vh}}</style><link rel="stylesheet" href="/assets/theme.css"></head>
<body><nav class="site-nav"><a class="site-brand" href="/"><img class="brand-logo" src="/assets/nxtcloud-logo.png" alt="NXT Cloud"><span class="site-brand-label">AI CONTENT GALLERY</span></a><div class="site-tools"><a href="/">← 갤러리</a><button class="theme-toggle" type="button" data-theme-toggle>🌙 다크</button></div></nav><main>
<div class="topbar"><span></span><a id="largeLink" href="#" target="_blank" rel="noopener">새 탭에서 크게 보기 ↗</a></div>
<header><h1 id="title">콘텐츠를 불러오는 중...</h1><div class="meta"><span id="cohort"></span><span id="category"></span><span id="version"></span><time id="uploadedAt"></time></div><button id="likeButton" type="button">♥ 추천 <span id="likeCount">0</span></button></header>
<div class="viewer"><iframe id="contentFrame" title="콘텐츠 플레이 화면"></iframe></div>
<section class="feedback" aria-label="피드백">
<form id="feedbackForm" class="panel"><h2>피드백 남기기</h2><label for="nickname">닉네임 <small>(선택)</small></label><input id="nickname" name="nickname" maxlength="20" autocomplete="nickname" placeholder="비우면 익명"><label for="message">내용</label><textarea id="message" name="message" maxlength="500" required placeholder="좋았던 점이나 개선 아이디어를 남겨 주세요."></textarea><button id="submitButton" type="submit">피드백 등록</button><p id="status" class="status" aria-live="polite"></p></form>
<div class="panel"><h2>받은 피드백</h2><div id="feedbackList" aria-live="polite"><p class="empty">피드백을 불러오는 중...</p></div></div>
</section></main>
<script>
const contentId=new URLSearchParams(location.search).get('id')||'';const idPattern=/^[0-9a-f]{8}$/;const title=document.getElementById('title'),cohort=document.getElementById('cohort'),category=document.getElementById('category'),version=document.getElementById('version'),uploadedAt=document.getElementById('uploadedAt'),frame=document.getElementById('contentFrame'),largeLink=document.getElementById('largeLink'),likeButton=document.getElementById('likeButton'),likeCount=document.getElementById('likeCount'),form=document.getElementById('feedbackForm'),list=document.getElementById('feedbackList'),status=document.getElementById('status'),submitButton=document.getElementById('submitButton');
function formatDate(value){const date=new Date(value);return Number.isNaN(date.getTime())?'업데이트 시각 알 수 없음':new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(date)}
function renderFeedback(items){list.replaceChildren();if(!items.length){const empty=document.createElement('p');empty.className='empty';empty.textContent='아직 피드백이 없어요. 첫 의견을 남겨 보세요!';list.append(empty);return}items.forEach(item=>{const article=document.createElement('article'),head=document.createElement('div'),name=document.createElement('strong'),time=document.createElement('time'),message=document.createElement('p');article.className='feedback-item';head.className='feedback-head';name.textContent=item.nickname;time.dateTime=item.createdAt;time.textContent=formatDate(item.createdAt);message.textContent=item.message;head.append(name,time);article.append(head,message);list.append(article)})}
async function loadFeedback(){const response=await fetch(`/api/feedback?id=${contentId}`);if(!response.ok)throw new Error('피드백을 불러오지 못했습니다.');renderFeedback((await response.json()).feedback)}
async function init(){if(!idPattern.test(contentId)){title.textContent='콘텐츠를 찾을 수 없습니다.';form.hidden=true;list.replaceChildren();return}try{const response=await fetch(`/api/content?id=${contentId}`);if(!response.ok)throw new Error();const game=(await response.json()).content;frame.src=game.contentUrl;largeLink.href=game.contentUrl;frame.addEventListener('load',()=>frame.contentWindow?.focus());title.textContent=game.name;cohort.textContent=game.affiliation;category.textContent=game.category;version.textContent=`v${game.latestVersion} · 업데이트`;uploadedAt.dateTime=game.updatedAt;uploadedAt.textContent=formatDate(game.updatedAt);likeCount.textContent=game.likes;likeButton.disabled=localStorage.getItem(`liked:${contentId}`)==='1';await loadFeedback()}catch{title.textContent='콘텐츠 정보를 불러오지 못했습니다.';list.replaceChildren();const error=document.createElement('p');error.className='empty';error.textContent='잠시 후 다시 시도해 주세요.';list.append(error)}}
likeButton.addEventListener('click',async()=>{likeButton.disabled=true;try{const response=await fetch('/api/like',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contentId})});if(!response.ok)throw new Error();likeCount.textContent=(await response.json()).likes;localStorage.setItem(`liked:${contentId}`,'1')}catch{likeButton.disabled=false}});
form.addEventListener('submit',async event=>{event.preventDefault();submitButton.disabled=true;status.textContent='등록 중...';try{const response=await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contentId,nickname:form.nickname.value,message:form.message.value})});const data=await response.json();if(!response.ok)throw new Error(data.error||'등록하지 못했습니다.');form.message.value='';status.textContent='피드백을 등록했습니다.';await loadFeedback()}catch(error){status.textContent=error.message}finally{submitButton.disabled=false}});
init();
</script></body></html>
